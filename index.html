<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroNebula's Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --beige: #F5F5DC; --tan: #D2B48C; --oak: #8B4513;
            --deep-brown: #3E2723; --paper: #FDFBF7;
        }
        body { background-color: var(--paper); color: var(--deep-brown); font-family: 'Georgia', serif; margin: 0; padding: 0; }
        .library-card { background: #FFFFFF; border: 1px solid var(--tan); box-shadow: 0 2px 4px rgba(62,39,35,0.05); border-radius: 0.5rem; transition: all 0.2s ease; position: relative; }
        .library-card:hover { transform: translateY(-2px); border-color: var(--oak); box-shadow: 0 4px 8px rgba(62,39,35,0.1); }
        .shelf-header { border-bottom: 3px solid var(--oak); }
        .status-pill { padding: 2px 8px; border-radius: 9999px; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--paper); }
        ::-webkit-scrollbar-thumb { background: var(--tan); border-radius: 4px; }
        .btn-oak { background-color: var(--oak); color: white; transition: opacity 0.2s; }
        .btn-oak:hover { opacity: 0.9; }
        input, select, textarea { border: 1px solid var(--tan); border-radius: 4px; padding: 0.25rem 0.5rem; font-size: 0.875rem; background: white; }
    </style>
</head>
<body class="p-4">

<div class="max-w-5xl mx-auto">
    <header class="mb-6 pb-4 shelf-header flex justify-between items-center">
        <div>
            <h1 class="text-2xl md:text-3xl font-bold">RetroNebula's Archive</h1>
            <p class="text-xs italic text-gray-600">✨ Offline-Ready • Manual Sync Enabled</p>
        </div>
        <div class="flex gap-2">
            <button onclick="openImport()" class="border border-oak text-oak px-3 py-2 rounded text-xs font-bold hover:bg-oak/10">Bulk Import</button>
            <button onclick="openForm()" class="btn-oak px-4 py-2 rounded text-sm font-bold shadow-sm">+ Add Title</button>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
        <aside class="md:col-span-4 space-y-6">
            <div class="bg-white p-4 rounded-lg border border-tan">
                <h2 class="text-sm font-bold mb-3">📊 Library Stats</h2>
                <div style="height: 180px;"><canvas id="statusChart"></canvas></div>
                <div class="mt-4 pt-4 border-t border-tan/30">
                    <button onclick="exportBackup()" class="text-[10px] text-oak hover:underline">Download Backup (.json)</button>
                </div>
            </div>
        </aside>

        <main class="md:col-span-8">
            <div class="flex flex-wrap gap-2 mb-4">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search titles..." class="flex-grow outline-none border-tan">
                <select id="statusFilter" onchange="handleFilter()" class="outline-none border-tan">
                    <option value="all">All Statuses</option>
                    <option value="reading">Reading</option>
                    <option value="read">Completed</option>
                    <option value="want to read">Plan to Read</option>
                    <option value="stalled">On Hold</option>
                </select>
            </div>
            <div id="mangaGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 h-[600px] overflow-y-auto pr-2"></div>
        </main>
    </div>
</div>

<!-- Form Modal -->
<div id="formModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-md rounded-lg p-6 border-2 border-oak shadow-2xl">
        <h2 id="formTitle" class="text-xl font-bold mb-4 border-b border-tan pb-2 text-oak">Edit Title</h2>
        <form id="mangaForm" onsubmit="handleSave(event)" class="space-y-4">
            <input type="hidden" id="editId">
            <div>
                <label class="block text-[10px] font-bold uppercase mb-1">Title</label>
                <input type="text" id="formName" class="w-full" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase mb-1">Status</label>
                    <select id="formStatus" class="w-full">
                        <option value="reading">Reading</option>
                        <option value="read">Completed</option>
                        <option value="want to read">Plan to Read</option>
                        <option value="stalled">Stalled</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase mb-1">Chapters</label>
                    <input type="number" id="formCh" class="w-full" value="0">
                </div>
            </div>
            <div class="flex gap-2 pt-4">
                <button type="button" onclick="closeForm()" class="flex-grow border border-tan py-2 rounded text-sm hover:bg-gray-50">Cancel</button>
                <button type="submit" class="flex-grow btn-oak py-2 rounded text-sm font-bold shadow-md">Save Changes</button>
            </div>
            <button type="button" id="deleteBtn" class="w-full text-red-600 text-xs mt-2 hidden hover:underline" onclick="handleDelete()">Remove from Archive</button>
        </form>
    </div>
</div>

<!-- Import Modal -->
<div id="importModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-lg rounded-lg p-6 border-2 border-oak shadow-2xl">
        <h2 class="text-xl font-bold mb-2 text-oak">Bulk Import Archive</h2>
        <p class="text-xs text-gray-500 mb-4 italic">Paste the contents of your exported JSON file below.</p>
        <textarea id="importArea" class="w-full h-64 font-mono text-xs mb-4 p-2 border border-tan/50" placeholder='Paste JSON content here...'></textarea>
        <div class="flex gap-2">
            <button onclick="closeImport()" class="flex-grow border border-tan py-2 rounded text-sm hover:bg-gray-50">Cancel</button>
            <button onclick="processImport()" class="flex-grow btn-oak py-2 rounded text-sm font-bold shadow-md">Load Archive</button>
        </div>
    </div>
</div>

<script>
    // This is your new Cloudflare URL from your screenshot
    const PROXY_URL = "/index"; 
    let mangaData = [];

    async function loadFromNotion() {
        const grid = document.getElementById('mangaGrid');
        grid.innerHTML = '<div class="col-span-full text-center py-20 animate-pulse">📚 Opening the Notion Archives...</div>';

        try {
            const resp = await fetch(PROXY_URL);
            const data = await resp.json();
            
            // This part converts Notion's data into your library cards
            mangaData = data.results.map(page => ({
                id: page.id,
                // Make sure these match your Notion column names!
                name: page.properties.Name?.title[0]?.plain_text || "Untitled",
                status: page.properties.Status?.select?.name || "want to read",
                ch: page.properties.Chapters?.number || 0
            }));

            render();
        } catch (err) {
            console.error(err);
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-600">Failed to connect to Notion Archives.</div>`;
        }
    }

    // ... (Keep the render, getStatusClass, and updateChart functions from the previous versions)

    document.addEventListener('DOMContentLoaded', loadFromNotion);
</script>
</body>
</html>
