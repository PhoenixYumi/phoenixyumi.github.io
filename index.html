<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroNebula's Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --beige: #F5F5DC; --tan: #D2B48C; --oak: #8B4513;
            --deep-brown: #3E2723; --paper: #FDFBF7;
        }
        body { background-color: var(--paper); color: var(--deep-brown); font-family: 'Georgia', serif; margin: 0; padding: 0; }
        .library-card { background: #FFFFFF; border: 1px solid var(--tan); box-shadow: 0 2px 4px rgba(62,39,35,0.05); border-radius: 0.5rem; transition: all 0.2s ease; position: relative; }
        .library-card:hover { transform: translateY(-2px); border-color: var(--oak); box-shadow: 0 4px 8px rgba(62,39,35,0.1); }
        .shelf-header { border-bottom: 3px solid var(--oak); }
        .status-pill { padding: 2px 8px; border-radius: 9999px; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--paper); }
        ::-webkit-scrollbar-thumb { background: var(--tan); border-radius: 4px; }
        .btn-oak { background-color: var(--oak); color: white; transition: opacity 0.2s; }
        .btn-oak:hover { opacity: 0.9; }
        input, select, textarea { border: 1px solid var(--tan); border-radius: 4px; padding: 0.25rem 0.5rem; font-size: 0.875rem; background: white; }
    </style>
</head>
<body class="p-4">

<div class="max-w-5xl mx-auto">
    <header class="mb-6 pb-4 shelf-header flex justify-between items-center">
        <div>
            <h1 class="text-2xl md:text-3xl font-bold">RetroNebula's Archive</h1>
            <p class="text-xs italic text-gray-600">✨ Offline-Ready • Manual Sync Enabled</p>
        </div>
        <div class="flex gap-2">
            <button onclick="openImport()" class="border border-oak text-oak px-3 py-2 rounded text-xs font-bold hover:bg-oak/10">Bulk Import</button>
            <button onclick="openForm()" class="btn-oak px-4 py-2 rounded text-sm font-bold shadow-sm">+ Add Title</button>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
        <aside class="md:col-span-4 space-y-6">
            <div class="bg-white p-4 rounded-lg border border-tan">
                <h2 class="text-sm font-bold mb-3">📊 Library Stats</h2>
                <div style="height: 180px;"><canvas id="statusChart"></canvas></div>
                <div class="mt-4 pt-4 border-t border-tan/30">
                    <button onclick="exportBackup()" class="text-[10px] text-oak hover:underline">Download Backup (.json)</button>
                </div>
            </div>
        </aside>

        <main class="md:col-span-8">
            <div class="flex flex-wrap gap-2 mb-4">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search titles..." class="flex-grow outline-none border-tan">
                <select id="statusFilter" onchange="handleFilter()" class="outline-none border-tan">
                    <option value="all">All Statuses</option>
                    <option value="reading">Reading</option>
                    <option value="read">Completed</option>
                    <option value="want to read">Plan to Read</option>
                    <option value="stalled">On Hold</option>
                </select>
            </div>
            <div id="mangaGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 h-[600px] overflow-y-auto pr-2"></div>
        </main>
    </div>
</div>

<!-- Form Modal -->
<div id="formModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-md rounded-lg p-6 border-2 border-oak shadow-2xl">
        <h2 id="formTitle" class="text-xl font-bold mb-4 border-b border-tan pb-2 text-oak">Edit Title</h2>
        <form id="mangaForm" onsubmit="handleSave(event)" class="space-y-4">
            <input type="hidden" id="editId">
            <div>
                <label class="block text-[10px] font-bold uppercase mb-1">Title</label>
                <input type="text" id="formName" class="w-full" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase mb-1">Status</label>
                    <select id="formStatus" class="w-full">
                        <option value="reading">Reading</option>
                        <option value="read">Completed</option>
                        <option value="want to read">Plan to Read</option>
                        <option value="stalled">Stalled</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase mb-1">Chapters</label>
                    <input type="number" id="formCh" class="w-full" value="0">
                </div>
            </div>
            <div class="flex gap-2 pt-4">
                <button type="button" onclick="closeForm()" class="flex-grow border border-tan py-2 rounded text-sm hover:bg-gray-50">Cancel</button>
                <button type="submit" class="flex-grow btn-oak py-2 rounded text-sm font-bold shadow-md">Save Changes</button>
            </div>
            <button type="button" id="deleteBtn" class="w-full text-red-600 text-xs mt-2 hidden hover:underline" onclick="handleDelete()">Remove from Archive</button>
        </form>
    </div>
</div>

<!-- Import Modal -->
<div id="importModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-lg rounded-lg p-6 border-2 border-oak shadow-2xl">
        <h2 class="text-xl font-bold mb-2 text-oak">Bulk Import Archive</h2>
        <p class="text-xs text-gray-500 mb-4 italic">Paste the contents of your exported JSON file below.</p>
        <textarea id="importArea" class="w-full h-64 font-mono text-xs mb-4 p-2 border border-tan/50" placeholder='Paste JSON content here...'></textarea>
        <div class="flex gap-2">
            <button onclick="closeImport()" class="flex-grow border border-tan py-2 rounded text-sm hover:bg-gray-50">Cancel</button>
            <button onclick="processImport()" class="flex-grow btn-oak py-2 rounded text-sm font-bold shadow-md">Load Archive</button>
        </div>
    </div>
</div>

<script>
    // Initialize data from LocalStorage
    let mangaData = JSON.parse(localStorage.getItem('retroArchive')) || [];
    let chartInstance = null;

    function render(data = mangaData) {
        const grid = document.getElementById('mangaGrid');
        
        if (!data.length) {
            grid.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center h-64 opacity-60">
                    <p class="text-sm italic mb-2">Your archive is currently empty.</p>
                    <button onclick="openImport()" class="text-xs text-oak underline">Import your JSON file to begin</button>
                </div>
            `;
            updateChart();
            return;
        }

        grid.innerHTML = '';
        data.sort((a, b) => a.name.localeCompare(b.name)).forEach(m => {
            const card = document.createElement('div');
            card.className = 'library-card p-3 flex flex-col justify-between h-32';
            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-1">
                        <span class="status-pill ${getStatusClass(m.status)}">${m.status}</span>
                        <button onclick="openForm('${m.id}')" class="text-xs opacity-20 hover:opacity-100 p-1">⚙️</button>
                    </div>
                    <h3 class="font-bold text-sm leading-tight line-clamp-2">${m.name}</h3>
                </div>
                <div class="text-[10px] text-gray-400 italic border-t border-tan/20 pt-1">
                    Progress: Ch. ${m.ch || 0}
                </div>
            `;
            grid.appendChild(card);
        });
        updateChart();
    }

    function getStatusClass(s) {
        const st = s.toLowerCase();
        if (st === 'reading') return 'bg-blue-100 text-blue-800';
        if (st === 'read' || st === 'completed') return 'bg-green-100 text-green-800';
        if (st === 'stalled') return 'bg-yellow-100 text-yellow-800';
        return 'bg-gray-100 text-gray-600';
    }

    function updateChart() {
        const ctx = document.getElementById('statusChart').getContext('2d');
        const stats = mangaData.reduce((acc, m) => { 
            const s = m.status.toLowerCase();
            acc[s] = (acc[s] || 0) + 1; 
            return acc; 
        }, {});
        
        const dataValues = [
            stats.reading || 0, 
            (stats.read || 0) + (stats.completed || 0), 
            stats['want to read'] || 0, 
            stats.stalled || 0
        ];

        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Reading', 'Completed', 'Plan', 'Stalled'],
                datasets: [{
                    data: dataValues,
                    backgroundColor: ['#AAD9BB', '#80BCBD', '#F9F7C9', '#D5F0C1'],
                    borderColor: '#3E2723', borderWidth: 1
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { 
                    legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10, family: 'Georgia' } } } 
                } 
            }
        });
    }

    window.handleSave = (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value || Math.random().toString(36).substr(2, 9);
        const entry = {
            id,
            name: document.getElementById('formName').value,
            status: document.getElementById('formStatus').value,
            ch: document.getElementById('formCh').value
        };
        
        const index = mangaData.findIndex(m => m.id === id);
        if(index > -1) mangaData[index] = entry;
        else mangaData.push(entry);
        
        saveAndRefresh();
        closeForm();
    };

    window.processImport = () => {
        const text = document.getElementById('importArea').value;
        if (!text.trim()) return;

        try {
            const raw = JSON.parse(text);
            const entries = raw.entries || raw;
            
            if (!Array.isArray(entries)) throw new Error();

            // Map keys from your export format to the app format
            mangaData = entries.map(e => ({
                id: Math.random().toString(36).substr(2, 9),
                name: e.name || "Unknown Title",
                status: (e.status || "want to read").toLowerCase(),
                ch: e.ch || 0
            }));
            
            saveAndRefresh();
            closeImport();
            alert(`Loaded ${mangaData.length} titles successfully!`);
        } catch (err) { 
            alert("Error: Please paste the full text of your JSON export file."); 
        }
    };

    function saveAndRefresh() {
        localStorage.setItem('retroArchive', JSON.stringify(mangaData));
        render();
    }

    window.exportBackup = () => {
        const blob = new Blob([JSON.stringify(mangaData, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `RetroArchive_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    };

    window.openForm = (id) => {
        document.getElementById('formModal').classList.remove('hidden');
        document.getElementById('formModal').classList.add('flex');
        if(id) {
            const m = mangaData.find(x => x.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('formName').value = m.name;
            document.getElementById('formStatus').value = m.status;
            document.getElementById('formCh').value = m.ch;
            document.getElementById('deleteBtn').classList.remove('hidden');
            document.getElementById('formTitle').innerText = "Edit Title";
        } else {
            document.getElementById('mangaForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('deleteBtn').classList.add('hidden');
            document.getElementById('formTitle').innerText = "Add New Title";
        }
    };

    window.handleDelete = () => {
        const id = document.getElementById('editId').value;
        if(confirm("Permanently remove this title from your archive?")) {
            mangaData = mangaData.filter(m => m.id !== id);
            saveAndRefresh();
            closeForm();
        }
    };

    window.handleSearch = () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        render(mangaData.filter(m => m.name.toLowerCase().includes(term)));
    };

    window.handleFilter = () => {
        const val = document.getElementById('statusFilter').value;
        render(val === 'all' ? mangaData : mangaData.filter(m => m.status.toLowerCase() === val));
    };

    window.closeForm = () => {
        document.getElementById('formModal').classList.add('hidden');
        document.getElementById('formModal').classList.remove('flex');
    };
    
    window.openImport = () => {
        document.getElementById('importModal').classList.remove('hidden');
        document.getElementById('importModal').classList.add('flex');
    };
    
    window.closeImport = () => {
        document.getElementById('importModal').classList.add('hidden');
        document.getElementById('importModal').classList.remove('flex');
    };

    // Run on load
    document.addEventListener('DOMContentLoaded', () => render());
</script>
</body>
</html>
