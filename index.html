<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetroNebula's Archive</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --beige: #F5F5DC; --tan: #D2B48C; --oak: #8B4513; --paper: #FDFBF7; }
body { background-color: var(--paper); color: #3E2723; font-family: 'Georgia', serif; }
.library-card { background: white; border: 1px solid var(--tan); border-radius: 0.5rem; transition: all 0.2s ease; }
.library-card:hover { transform: translateY(-2px); border-color: var(--oak); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
.status-pill { padding: 2px 8px; border-radius: 9999px; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
</style>
</head>
<body class="p-4">

<div class="max-w-5xl mx-auto">
<header class="mb-6 pb-4 border-b-2 border-oak flex justify-between items-center">
<div>
<h1 class="text-2xl font-bold">RetroNebula's Archive</h1>
<p class="text-xs italic text-gray-500">Live Notion Sync</p>
</div>
<button onclick="loadFromNotion()" class="bg-stone-800 text-white px-4 py-2 rounded text-sm font-bold shadow-sm hover:bg-stone-700">🔄 Refresh</button>
</header>

<div class="grid grid-cols-1 md:grid-cols-12 gap-6">
    <aside class="md:col-span-4">
        <div class="bg-white p-4 rounded-lg border border-tan shadow-sm">
            <h2 class="text-sm font-bold mb-3">📊 Library Stats</h2>
            <div style="height: 180px;"><canvas id="statusChart"></canvas></div>
        </div>
    </aside>
    <main class="md:col-span-8">
        <div class="mb-4 flex gap-2">
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search archive..." class="flex-grow border border-tan rounded p-2 text-sm outline-none">
        </div>
        <div id="mangaGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 h-[600px] overflow-y-auto pr-2">
            <!-- Data will load here -->
        </div>
    </main>
</div>


</div>

<script>
const PROXY_URL = "/index";
let mangaData = [];
let chartInstance = null;

async function loadFromNotion() {
    const grid = document.getElementById(&quot;mangaGrid&quot;);
    grid.innerHTML = &#39;&lt;div class=&quot;col-span-full text-center py-20 animate-pulse text-oak italic&quot;&gt;📚 Consulting the Notion Archives...&lt;/div&gt;&#39;;

    try {
        const resp = await fetch(PROXY_URL);
        const data = await resp.json();
        
        if (data.error) throw new Error(data.error);

        mangaData = data.results.map(page =&gt; ({
            id: page.id,
            name: page.properties.Name?.title[0]?.plain_text || &quot;Untitled&quot;,
            status: page.properties.Status?.select?.name || &quot;Plan to Read&quot;,
            ch: page.properties.Chapters?.number || 0
        }));

        render();
    } catch (err) {
        console.error(&quot;Notion Error:&quot;, err);
        grid.innerHTML = &#39;&lt;div class=&quot;col-span-full text-center py-20 text-red-700&quot;&gt;Connection Failed. Check Cloudflare secrets and Notion connection.&lt;/div&gt;&#39;;
    }
}

function render(data = mangaData) {
    const grid = document.getElementById(&quot;mangaGrid&quot;);
    grid.innerHTML = &quot;&quot;;
    
    data.sort((a, b) =&gt; a.name.localeCompare(b.name)).forEach(m =&gt; {
        const card = document.createElement(&quot;div&quot;);
        card.className = &quot;library-card p-4 flex flex-col justify-between h-32&quot;;
        card.innerHTML = `
            &lt;div&gt;
                &lt;span class=&quot;status-pill bg-stone-100 text-stone-600&quot;&gt;${m.status}&lt;/span&gt;
                &lt;h3 class=&quot;font-bold text-sm mt-2&quot;&gt;${m.name}&lt;/h3&gt;
            &lt;/div&gt;
            &lt;div class=&quot;text-[11px] text-gray-400 border-t border-gray-100 pt-2 italic&quot;&gt;Progress: Ch. ${m.ch}&lt;/div&gt;
        `;
        grid.appendChild(card);
    });
    updateChart();
}

function handleSearch() {
    const term = document.getElementById(&quot;searchInput&quot;).value.toLowerCase();
    render(mangaData.filter(m =&gt; m.name.toLowerCase().includes(term)));
}

function updateChart() {
    const ctx = document.getElementById(&quot;statusChart&quot;).getContext(&quot;2d&quot;);
    const stats = mangaData.reduce((acc, m) =&gt; { 
        const s = m.status || &quot;Other&quot;;
        acc[s] = (acc[s] || 0) + 1; 
        return acc; 
    }, {});
    
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: &quot;doughnut&quot;,
        data: {
            labels: Object.keys(stats),
            datasets: [{
                data: Object.values(stats),
                backgroundColor: [&quot;#AAD9BB&quot;, &quot;#80BCBD&quot;, &quot;#F9F7C9&quot;, &quot;#D5F0C1&quot;, &quot;#E5E7EB&quot;],
                borderWidth: 1
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: &quot;bottom&quot;, labels: { boxWidth: 10, font: { size: 9 } } } } }
    });
}

document.addEventListener(&quot;DOMContentLoaded&quot;, loadFromNotion);


</script>

</body>
</html>
